<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background: dark navy rounded square -->
  <rect width="64" height="64" rx="14" fill="#0f172a"/>

  <!-- Stylized industrial crate icon -->
  <!-- Outer box -->
  <rect x="9" y="14" width="46" height="36" rx="4" fill="none" stroke="#f97316" stroke-width="3.5" stroke-linejoin="round"/>
  <!-- Horizontal slat (mid) -->
  <line x1="9" y1="32" x2="55" y2="32" stroke="#f97316" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Vertical slat (left third) -->
  <line x1="24" y1="14" x2="24" y2="50" stroke="#f97316" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Vertical slat (right third) -->
  <line x1="40" y1="14" x2="40" y2="50" stroke="#f97316" stroke-width="2.5" stroke-linecap="round"/>

  <!-- "RE" monogram badge overlay bottom-right -->
  <rect x="38" y="38" width="20" height="16" rx="4" fill="#1d4ed8"/>
  <text x="48" y="51" text-anchor="middle" font-family="Arial,sans-serif" font-weight="900" font-size="10" fill="#ffffff" letter-spacing="0.5">RE</text>
</svg>